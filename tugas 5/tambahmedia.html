<!DOCTYPE html>
<html>
  <head>
    <title>Tugas 5 - Gambar, Video, dan Audio</title>
  </head>
  <body>
 
    <h1>Tugas 5 - Menambahkan Media ke Halaman Web</h1>
    <p>menambahkan gambar, video, dan audio di HTML.</p>
 
    <hr>
 
 
    <h2>1. Gambar</h2>


    <h3>Gambar dari Internet</h3>
 
    <img src="https://cdn.pixabay.com/photo/2026/04/02/15/17/regencygirl123-forest-10205699_1280.jpg"
         alt="Foto pemandangan alam"
         width="400">
 
    <br><br>
 
    <h3>Gambar dari File Lokal</h3>
 
    <img src="gacor kang.JPEG"
         alt="Foto dari folder lokal"
         width="400">
 
    <br>
    <br>
 
 
    <hr>
 
 
    <h2>2. Video</h2>
 
    <h3>Video dari File Lokal</h3>
 
    <video width="400" controls>
      <source src="WhatsApp Video 2026-05-01 at 08.33.52.mp4" type="video/mp4">
      Browser kamu tidak mendukung tag video.
    </video>
 
    <br>
    <br>
 
    <h3>Video dari YouTube</h3>
 
    <iframe width="400"
            height="225"
            src="https://www.youtube.com/embed/znfL2YNO9Ug"
            allowfullscreen>
    </iframe>
 
    <br><br>
 
    <hr>
 
    <h2>3. Audio</h2>
 
    <h3>Audio dari File Lokal</h3>

    <audio controls>
      <source src="WhatsApp Audio 2026-04-16 at 15.09.12 (1).ogg" type="audio/mpeg">
      Browser kamu tidak mendukung tag audio.
    </audio>
 
    <br><br>
     
    <hr>
 
  </body>
</html>
